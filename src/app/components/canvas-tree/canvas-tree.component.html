<div class="canvas-tree-container" [class.fullscreen-mode]="isFullscreen" #container>
  <!-- Canvas Tree Controls -->
  <div class="tree-controls" (mouseenter)="clearMenuTimeout()" (mouseleave)="resetMenuTimeout()" (touchstart)="resetMenuTimeout()">
    
    <!-- Main Menu Toggle Button -->
    <button 
      type="button"
      class="control-btn menu-toggle" 
      (click)="toggleMenu()" 
      title="Menu Tools"
      aria-label="Toggle Menu Tools">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <!-- Settings Gear Icon -->
        <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
      </svg>
    </button>

    <div class="control-group" [class.is-visible]="isMenuOpen">
      <button 
        type="button"
        class="control-btn zoom-in" 
        (click)="zoomIn()" 
        title="Zoom In"
        aria-label="Zoom in">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
      </button>
      
      <button 
        type="button"
        class="control-btn zoom-out" 
        (click)="zoomOut()" 
        title="Zoom Out"
        aria-label="Zoom out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13H5v-2h14v2z"/>
        </svg>
      </button>
      
      <button 
        type="button"
        class="control-btn reset-zoom" 
        (click)="resetZoom()" 
        title="Reset Zoom"
        aria-label="Reset zoom to default">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
      </button>
      
      <button 
        type="button"
        class="control-btn fit-screen" 
        (click)="fitToScreen()" 
        title="Fit to Screen"
        aria-label="Fit tree to screen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 4h16v16H4V4zm2 2v12h12V6H6zm2 2h8v8H8V8z"/>
        </svg>
      </button>
      
      <button 
        type="button"
        class="control-btn fullscreen-toggle" 
        (click)="toggleFullscreen()" 
        [title]="isFullscreen ? 'Exit Fullscreen' : 'Enter Fullscreen'"
        [attr.aria-label]="isFullscreen ? 'Exit Fullscreen' : 'Enter Fullscreen'">
        <svg *ngIf="!isFullscreen" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
        <svg *ngIf="isFullscreen" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
        </svg>
      </button>
    </div>
    
    <div class="zoom-info" [class.is-visible]="isMenuOpen">
      <span class="zoom-level">{{ (zoom * 100) | number:'1.0-0' }}%</span>
    </div>
  </div>

  <!-- Canvas Element -->
  <canvas 
    #canvas
    class="tree-canvas"
    [attr.aria-label]="'Interactive family tree with ' + (personData?.name || 'family members')"
    role="img">
  </canvas>

  <!-- Instructions -->
  <div class="tree-instructions">
    <div class="instruction-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <span>Mouse wheel to zoom</span>
    </div>
    
    <div class="instruction-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <span>Drag to pan</span>
    </div>
    
    <div class="instruction-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <span>Click nodes to select</span>
    </div>
  </div>
</div>
